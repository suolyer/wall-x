# Smoke config — refactor_2604 lerobot backend end-to-end check.
# Goal: 1 epoch * libero (small), exercise build_data → backends/lerobot/build.
# Val runs ONCE at epoch end (base_trainer always calls val_loop after train_loop);
# val_interval kept huge so mid-epoch val never fires.
model_type: qwen2_5

task:
  dof_config:
    master_right_ee_cartesian_pos: 3
    master_right_ee_rotation: 3
    master_right_gripper: 1
  agent_pos_config:
    follow_right_ee_cartesian_pos: 3
    follow_right_ee_rotation: 3
    follow_right_gripper: 2
  action_horizon: 32
  action_horizon_flow: 32
  use_state_string_representation: false

model:
  backbone: qwen2_5
  config_path: /path/to/wall-oss-0.5/config.json
  processor_path: /path/to/Qwen2.5-VL-3B-Instruct
  pretrained_path: /path/to/Qwen2.5-VL-3B-Instruct
  attn_deterministic: true
  use_ema: false
  flow_loss_weight: 1.0
  enable_customized_robot_config: true
  customized_robot_config:
    name: "physical-intelligence/libero"
    customized_dof_config:
      panda_action_eef_with_gripper: 7
    customized_agent_pos_config:
      panda_state_eef_with_gripper: 8

hyperparams:
  num_epoch: 1
  batch_size_per_gpu: 1
  gradient_accumulation_steps: 1
  seed: 10233
  optimizer:
    optimizer_type: adamw
    learning_rate: 0.0001
    max_grad_norm: 1.0
    enable_grad_clip: true
    betas: [0.9, 0.95]
    weight_decay: 1.0e-8
    eps: 1.0e-8
  scheduler:
    scheduler_type: cosine
    num_warmup_steps: 10
    num_training_steps: 100
    min_lr: 1.0e-5

distributed:
  use_fsdp: true
  use_mixed_precision: true
  bf16: true

data:
  dataset_type: lerobot
  lerobot_config:
    # video-format LIBERO from modelscope (lerobot/libero, codebase v3.0).
    # Init takes ~21s for full 1693 episodes vs ~2h for the image-in-parquet
    # libero_pi0_v30 — same 273k frames, same Franka Panda 7-DoF schema.
    repo_id: /path/to/libero_all
    root: null
  key_mappings:
    camera:
      observation.images.image: face_view
      observation.images.image2: right_wrist_view
    state: observation.state
    action: action
  norm_stats_path: /path/to/libero_all_norm_stats.json
  train_test_split: 0.95
  num_workers: 8
  resolution:
    face_view: 256
    left_wrist_view: 256
    right_wrist_view: 256

logging:
  log_name: lerobot_smoke
  log_project: wallx_smoke
  log_entity: x2robot
  use_wandb: false
  log_interval: 1
  save_interval: 1000000
  val_interval: 1000000               # only epoch-end val will fire
  epoch_save_interval: 1

checkpoint:
  save_path: ./ckpt/smoke/lerobot
  validate_first: false               # no pre-train val (default; explicit)

debug:
  profile: false
  nvtx: false
